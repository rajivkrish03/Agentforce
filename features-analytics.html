<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salesforce AI Features — Analytics Table</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0B0B0F;
      --surface: #1B1B1F;
      --surface2: #232329;
      --border: rgba(255,255,255,0.07);
      --text: #FFFFFF;
      --muted: #8A90A0;
      --predictive: #0176D3;
      --generative: #FFDB3C;
      --agentic: #E31754;
      --service: #06A59A;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .page-header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(27,27,31,0.8);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #0176D3;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .page-header p { font-size: 13px; color: var(--muted); }

    /* ── Filters ── */
    .controls {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .filter-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-right: 4px; }
    .pill {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      background: var(--surface);
      color: var(--muted);
      transition: all 0.15s;
    }
    .pill:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .pill.active { color: #000; font-weight: 800; }
    .pill.all.active    { background: #fff; border-color: #fff; color: #000; }
    .pill.predictive.active { background: var(--predictive); border-color: var(--predictive); color: #fff; }
    .pill.generative.active { background: var(--generative); border-color: var(--generative); color: #000; }
    .pill.agentic.active    { background: var(--agentic); border-color: var(--agentic); color: #fff; }

    .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

    .search-wrap { position: relative; margin-left: auto; }
    .search-wrap input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 8px 14px 8px 34px;
      border-radius: 10px;
      outline: none;
      width: 220px;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: rgba(255,255,255,0.2); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--muted);
      pointer-events: none;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 24px;
      padding: 14px 40px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .stat { display: flex; align-items: center; gap: 8px; }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .stat-val { font-size: 13px; font-weight: 800; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; padding: 0 40px 60px; }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
      margin-top: 16px;
    }

    thead th {
      text-align: left;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      padding: 8px 16px;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }

    tbody tr.feature-row {
      background: var(--surface);
      cursor: pointer;
      transition: background 0.15s;
    }
    tbody tr.feature-row:hover { background: var(--surface2); }
    tbody tr.feature-row td {
      padding: 14px 16px;
      vertical-align: middle;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    tbody tr.feature-row td:first-child {
      border-left: 1px solid var(--border);
      border-radius: 12px 0 0 12px;
    }
    tbody tr.feature-row td:last-child {
      border-right: 1px solid var(--border);
      border-radius: 0 12px 12px 0;
    }
    tbody tr.feature-row.expanded td {
      border-bottom: none;
      border-radius: 12px 12px 0 0 !important;
    }

    tbody tr.detail-row td {
      background: #17171B;
      border: 1px solid var(--border);
      border-top: none;
      padding: 0;
      border-radius: 0 0 12px 12px;
    }
    .detail-inner {
      padding: 20px 24px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
    }

    /* Cells */
    .symbol-cell {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      width: 52px;
      height: 52px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .era-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border: 1px solid;
    }

    .channel-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .channel-tag {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .desc-cell { font-size: 12px; color: #C0C7D4; line-height: 1.5; max-width: 300px; }
    .name-cell { font-size: 13px; font-weight: 800; color: var(--text); }
    .fullname-cell { font-size: 10px; color: var(--muted); margin-top: 2px; font-style: italic; }

    .chevron { font-size: 16px; color: var(--muted); transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    /* Detail panels */
    .detail-section h4 {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 12px;
    }
    .storyline-steps { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .storyline-steps li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 12px;
      color: #C0C7D4;
    }
    .step-num {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; flex-shrink: 0;
    }
    .bv-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .bv-list li { font-size: 12px; color: #C0C7D4; display: flex; align-items: start; gap: 6px; }
    .bv-dot { color: #0176D3; margin-top: 2px; }

    .specs-grid { display: flex; flex-direction: column; gap: 8px; }
    .spec-item { display: flex; flex-direction: column; gap: 2px; }
    .spec-key { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; color: rgba(156, 64, 255, 0.5); }
    .spec-val { font-size: 12px; color: #C0C7D4; }

    .detail-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-docs {
      flex: 1; padding: 8px 12px;
      background: rgba(1,118,211,0.1);
      border: 1px solid rgba(1,118,211,0.3);
      color: #0176D3;
      border-radius: 8px;
      font-family: inherit; font-size: 9px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.15em;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-docs:hover { background: #0176D3; color: #fff; }
    .btn-demo {
      flex: 1; padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      font-family: inherit; font-size: 9px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.15em;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-demo:hover { color: var(--text); background: rgba(255,255,255,0.08); }

    .no-results {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>AI Explorer — Features Analytics</h1>
  <p>Salesforce Service Cloud · All AI Capabilities · Source of truth for feature metadata</p>
</div>

<div class="controls">
  <span class="filter-label">Era</span>
  <button class="pill all active" data-era="all">All</button>
  <button class="pill predictive" data-era="predictive">🔵 Predictive</button>
  <button class="pill generative" data-era="generative">🟡 Generative</button>
  <button class="pill agentic" data-era="agentic">🩷 Agentic</button>

  <div class="sep"></div>

  <span class="filter-label">Channel</span>
  <button class="pill active" data-channel="all">All</button>
  <button class="pill" data-channel="cases">Cases</button>
  <button class="pill" data-channel="messaging">Messaging</button>
  <button class="pill" data-channel="voice">Voice</button>
  <button class="pill" data-channel="email">Email</button>
  <button class="pill" data-channel="field_service">Field Service</button>
  <button class="pill" data-channel="knowledge">Knowledge</button>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search features…" />
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="table-wrap">
  <table id="features-table">
    <thead>
      <tr>
        <th style="width:60px"></th>
        <th>Feature</th>
        <th>Era</th>
        <th>Channels</th>
        <th>Description</th>
        <th style="width:40px"></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <div id="no-results" class="no-results" style="display:none">No features match the current filters.</div>
</div>

<script>
const ERA_COLORS = {
  predictive: { color: '#0176D3', bg: 'rgba(1,118,211,0.12)', label: 'Predictive AI' },
  generative:  { color: '#FFDB3C', bg: 'rgba(255,219,60,0.12)', label: 'Generative AI' },
  agentic:     { color: '#E31754', bg: 'rgba(227,23,84,0.12)',  label: 'Agentic AI' },

const CAPABILITIES = [
  // CASES

  { id:'ecr',  symbol:'Er', name:'Case Routing',           fullName:'Einstein Case Routing',            era:'predictive', channels:['cases'],                                  description:'Uses predicted field values to ensure cases reach the right agent or queue immediately.',                        storyline:['Einstein predicts case category','Omni-Channel uses prediction to find expert','Case is pushed to agent'],        useCases:['Reducing transfers','Faster first response'],                      specs:{logic:'Omni-Channel',trigger:'Classification'} },
  { id:'ecw',  symbol:'Ew', name:'Case Wrap-Up',           fullName:'Einstein Case Wrap-Up',            era:'predictive', channels:['cases'],                                  description:'Suggests values for fields like "Resolution" or "Root Cause" when an agent is closing a case.',                  storyline:['Agent begins closing case','Einstein suggests wrap-up values','Agent confirms and saves'],                         useCases:['Streamlined closing','Better trend reporting'],                    specs:{trigger:'Status: Closed',feedback:'Real-time'} },
  { id:'ear',  symbol:'Ar', name:'Article Recommendations',fullName:'Einstein Article Recommendations', era:'predictive', channels:['cases','messaging','voice','email','knowledge'], description:'Automatically finds and recommends the best knowledge articles to resolve cases faster.',                     storyline:['Agent views case','Einstein searches knowledge base','Top articles are surfaced in sidebar'],                     useCases:['Agent enablement','Consistency in support'],                       specs:{tech:'Vectorized Search',accuracy:'High'} },
  { id:'ecm',  symbol:'Em', name:'Conversation Mining',    fullName:'Einstein Conversation Mining',     era:'predictive', channels:['cases','messaging','voice'],              description:'Analyzes case and chat transcripts to uncover common customer problems and automation opportunities.',             storyline:['Manager selects transcripts','Einstein extracts recurring patterns','New bot intents are identified'],            useCases:['Data-driven bot strategy','Process optimization'],                 specs:{insight:'Unsupervised ML',output:'Intent Map'} },
  { id:'ews',  symbol:'Ws', name:'Work Summaries',         fullName:'Einstein Work Summaries',          era:'generative', channels:['cases','messaging','voice','field_service'], description:'Automatically drafts case summaries, issues, and resolutions based on interaction history.',                   storyline:['Interaction ends','Einstein drafts the wrap-up summary','Agent saves to record'],                                 useCases:['Reduced after-call work','Standardized logging'],                  specs:{model:'LLM Generative',speed:'Near-instant'} },
  { id:'esc',  symbol:'Gs', name:'Enhanced Summaries',     fullName:'Enhanced Summaries (Case)',        era:'generative', channels:['cases'],                                  description:'Provides agents with a concise overview of complex, long-running cases they are inheriting.',                      storyline:['Agent opens old case','GenAI summarizes 20+ emails/notes','Agent is briefed in seconds'],                        useCases:['Faster case transfers','Manager escalation reviews'],               specs:{volume:'Multi-document',length:'Concise'} },
  { id:'ekc',  symbol:'Kc', name:'Knowledge Creation',     fullName:'Einstein Knowledge Creation',      era:'generative', channels:['cases','messaging','email','knowledge'],  description:'Drafts articles directly from resolved cases to grow the company knowledge base organically.',                    storyline:['Case resolved','Einstein drafts a "How-to"','Article is reviewed for publishing'],                               useCases:['Closing knowledge gaps','Crowdsourced expertise'],                 specs:{workflow:'Integrated Review',source:'Case + Conversations'} },
  { id:'esre', symbol:'Sr', name:'Service Replies',        fullName:'Einstein Service Replies',         era:'generative', channels:['cases','messaging','email'],               description:'Generates personalized, grounded drafts for agents to use when replying to customers.',                            storyline:['Customer sends query','Einstein drafts perfect response','Agent clicks send'],                                    useCases:['Speeding up replies','Consistent brand voice'],                    specs:{base:'Knowledge Articles',grounding:'CRM Data'} },
  { id:'esa',  symbol:'Sa', name:'Search Answers',         fullName:'Einstein Search Answers',          era:'generative', channels:['cases','knowledge'],                      description:'Provides a direct, generated answer at the top of search results instead of just listing links.',                   storyline:['Agent searches "Policy"','Einstein reads top article','Einstein generates summary answer'],                       useCases:['Faster information retrieval','Reduced reading time'],              specs:{tech:'RAG',trust:'Einstein Trust Layer'} },
  { id:'asa',  symbol:'Aa', name:'Service Assistant',      fullName:'Agentforce Service Assistant',     era:'agentic',    channels:['cases','messaging'],                      description:'An intelligent companion in the Service Console that plans actions and assists agents in real-time.',                storyline:['Agent asks "Can you help?"','Assistant plans investigation','Assistant suggests deep actions'],                   useCases:['Expert guidance for all agents','Workflow automation'],            specs:{engine:'Atlas Reasoning',interface:'Sidepanel'} },
  { id:'asp',  symbol:'Ap', name:'Service Planner',        fullName:'Agentforce Service Planner',       era:'agentic',    channels:['cases'],                                  description:'The reasoning engine that breaks down high-level service goals into granular steps.',                               storyline:['Complex goal identified','Planner maps dependencies','Planner coordinates execution'],                           useCases:['Managing multi-step resolutions','Coordination of CRM tasks'],     specs:{tech:'Dynamic Reasoning',outcome:'Goal-oriented'} },
  // MESSAGING
  { id:'ebots',symbol:'Eb', name:'Einstein Bots',          fullName:'Einstein Bots',                    era:'predictive', channels:['messaging'],                              description:'Intelligent chatbots that automate common tasks and deflect basic queries via messaging.',                          storyline:['Customer types "Hello"','Bot identifies intent','Bot executes automated flow'],                                  useCases:['24/7 basic support','Handling high volumes'],                      specs:{engine:'NLU',tools:'Flow Builder'} },
  { id:'cs',   symbol:'Cs', name:'Conv Summaries',         fullName:'Conversation Summaries',           era:'generative', channels:['messaging','voice'],                      description:'Generates concise summaries of ongoing or completed conversations for faster context.',                             storyline:['Chat reaches 50+ lines','Einstein creates contextual snippet','New agent reads it in 2 seconds'],                useCases:['Improved hand-offs','Supervisor monitoring'],                      specs:{latency:'Real-time',precision:'Detailed'} },
  { id:'cc',   symbol:'Cc', name:'Conv Catch-Up',          fullName:'Conversation Catch-Up',            era:'generative', channels:['messaging','voice'],                      description:'Provides a "catch-up" summary specifically for agents being transferred into a live chat.',                        storyline:['Agent 1 transfers chat','Agent 2 gets "Catch-up" alert','Agent 2 responds with full context'],                  useCases:['Eliminating repetitive questions','Seamless transfers'],           specs:{trigger:'Transfer event',speed:'Instant'} },

  { id:'psss', symbol:'Ps', name:'Proactive Service',      fullName:'Proactive Service for Self-Service',era:'agentic',   channels:['messaging'],                              description:'Initiates self-service help proactively based on business signals (e.g., shipment delay).',                       storyline:['Event: Item out of stock','Agent triggers messaging outreach','Customer resolves via Bot'],                       useCases:['Reducing inbound inquiries','Improving CSAT'],                     specs:{trigger:'Data Cloud Signals',outreach:'Digital'} },
  // VOICE

  { id:'av',   symbol:'Av', name:'Agentforce Voice',       fullName:'Agentforce Voice',                 era:'agentic',    channels:['voice'],                                  description:'Enables autonomous AI to conduct voice-based customer support with natural language understanding.',                 storyline:['Phone rings','Vocal agent answers fluently','Task resolved via voice command'],                                  useCases:['High-scale phone support','Personalized IVR'],                     specs:{tech:'VoiceBot',NLP:'Deep Learning'} },
  // EMAIL
  { id:'eet',  symbol:'Et', name:'Email Templates',        fullName:'Einstein Email Templates',         era:'generative', channels:['email'],                                  description:'Helps admins generate beautiful, context-relevant email templates in seconds.',                                     storyline:['Admin needs "Renewal" template','Einstein drafts HTML & text','Template deployed across org'],                  useCases:['Faster setup','Better formatting'],                                specs:{type:'Content creation',grounding:'Org Metadata'} },
  // FIELD SERVICE
  { id:'nba',  symbol:'Nb', name:'Next Best Action',       fullName:'Einstein Next Best Action',        era:'predictive', channels:['field_service'],                          description:'Recommends optimal up-sell and cross-sell opportunities at the moment of job completion.',                          storyline:['Technician finishes repair','Einstein suggests "Battery Upgrade"','Technician adds to work order'],             useCases:['Increasing field revenue','Proactive maintenance'],                specs:{tech:'Recommendation Engine',UI:'App & Console'} },
  { id:'erb',  symbol:'Rb', name:'Recommend Builder',      fullName:'Einstein Recommendation Builder',  era:'predictive', channels:['field_service'],                          description:'Allows builds of custom recommendation models to predict parts, skills, or objects for field jobs.',                storyline:['Historical work orders analyzed','Einstein predicts "Skill: HVAC Senior"','Dispatcher assigns correctly'],      useCases:['Optimizing first-time fix rates','Resource allocation'],           specs:{tool:'Declarative Builder',target:'Any Standard Object'} },
  { id:'pwb',  symbol:'Pb', name:'Pre-Work Brief',         fullName:'Pre-Work Brief (GenAI)',           era:'generative', channels:['field_service'],                          description:'Gathers all customer history and asset info into a short, easy-to-read brief for a mobile technician.',           storyline:['Technician arrives on site','Opens mobile phone','GenAI gives 3-point summary of asset history'],               useCases:['Better prepared technicians','Enhanced customer experience'],       specs:{output:'Mobile Optimized',source:'Asset & Case History'} },
  { id:'afsa', symbol:'Af', name:'FS Agent',               fullName:'Agentforce Field Service Agent',   era:'agentic',    channels:['field_service'],                          description:'An autonomous agent that manages technician questions and administrative field tasks.',                             storyline:['Technician asks "How many bolts?"','Agent checks PDF manual','Agent supplies specs instantly'],                  useCases:['Mobile self-sufficiency','Reduced back-office calls'],             specs:{tech:'Retrieval Augmented Plan',UI:'FSL Mobile App'} },
  { id:'asa_sched',symbol:'As',name:'Scheduling Agent',    fullName:'Agentforce Scheduling Agent',      era:'agentic',    channels:['field_service'],                          description:'Manages complex rescheduling and scheduling tasks autonomously for customers.',                                     storyline:["Customer texts 'Can\\'t make it'",'Agent finds new slot','Agent updates job in FSL'],                           useCases:['Appointment flexibility','Dispatcher relief'],                     specs:{logic:'Optimization Engine',flow:'Conversational'} },
  // KNOWLEDGE
  { id:'eke',  symbol:'Ke', name:'Knowledge Edits',        fullName:'Einstein Knowledge Edits',         era:'generative', channels:['knowledge'],                              description:'Helps knowledge managers rewrite, shorten, or change the tone of existing articles.',                              storyline:['Clunky article text highlighted','Einstein rewrites for clarity','Manager publishes professional version'],      useCases:['Faster article lifecycle','Better readability'],                   specs:{feature:'Tone & Style control',tool:'Knowledge Console'} },
];

let activeEra = 'all';
let activeChannel = 'all';
let searchQuery = '';
let expandedId = null;

function getFiltered() {
  return CAPABILITIES.filter(c => {
    const eraOk = activeEra === 'all' || c.era === activeEra;
    const chanOk = activeChannel === 'all' || c.channels.includes(activeChannel);
    const q = searchQuery.toLowerCase();
    const textOk = !q || c.name.toLowerCase().includes(q) || c.fullName.toLowerCase().includes(q) || c.description.toLowerCase().includes(q);
    return eraOk && chanOk && textOk;
  });
}

function renderStats(filtered) {
  const p = filtered.filter(c => c.era === 'predictive').length;
  const g = filtered.filter(c => c.era === 'generative').length;
  const a = filtered.filter(c => c.era === 'agentic').length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-dot" style="background:#fff"></div><span class="stat-label">Total</span><span class="stat-val">${filtered.length}</span></div>
    <div class="stat"><div class="stat-dot" style="background:#0176D3"></div><span class="stat-label">Predictive</span><span class="stat-val" style="color:#0176D3">${p}</span></div>
    <div class="stat"><div class="stat-dot" style="background:#FFDB3C"></div><span class="stat-label">Generative</span><span class="stat-val" style="color:#FFDB3C">${g}</span></div>
    <div class="stat"><div class="stat-dot" style="background:#E31754"></div><span class="stat-label">Agentic</span><span class="stat-val" style="color:#E31754">${a}</span></div>
  `;
}

function eraBadge(era) {
  const e = ERA_COLORS[era];
  return `<span class="era-badge" style="color:${e.color};background:${e.bg};border-color:${e.color}40">${e.label}</span>`;
}

function channelTags(channels) {
  return `<div class="channel-tags">${channels.map(ch => `<span class="channel-tag">${ch.replace('_',' ')}</span>`).join('')}</div>`;
}

function renderTable() {
  const filtered = getFiltered();
  const tbody = document.getElementById('table-body');
  const noResults = document.getElementById('no-results');

  renderStats(filtered);

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  let html = '';
  filtered.forEach(cap => {
    const era = ERA_COLORS[cap.era];
    const isOpen = expandedId === cap.id;

    html += `
    <tr class="feature-row ${isOpen ? 'expanded' : ''}" data-id="${cap.id}">
      <td>
        <div class="symbol-cell" style="color:${era.color};background:${era.bg}">
          ${cap.symbol}
        </div>
      </td>
      <td>
        <div class="name-cell">${cap.name}</div>
        <div class="fullname-cell">${cap.fullName}</div>
      </td>
      <td>${eraBadge(cap.era)}</td>
      <td>${channelTags(cap.channels)}</td>
      <td><div class="desc-cell">${cap.description}</div></td>
      <td><span class="chevron ${isOpen ? 'open' : ''}">▾</span></td>
    </tr>
    `;

    if (isOpen) {
      const storylineHtml = cap.storyline.map((s,i) =>
        `<li><span class="step-num">${i+1}</span>${s}</li>`
      ).join('');
      const bvHtml = cap.useCases.map(u =>
        `<li><span class="bv-dot">•</span>${u}</li>`
      ).join('');
      const specsHtml = Object.entries(cap.specs).map(([k,v]) =>
        `<div class="spec-item"><span class="spec-key">${k}</span><span class="spec-val">${v}</span></div>`
      ).join('');

      html += `
      <tr class="detail-row">
        <td colspan="6">
          <div class="detail-inner">
            <div class="detail-section">
              <h4 style="color:${era.color}">Functional Storyline</h4>
              <ul class="storyline-steps">${storylineHtml}</ul>
            </div>
            <div class="detail-section">
              <h4 style="color:#0176D3">Business Value</h4>
              <ul class="bv-list">${bvHtml}</ul>
            </div>
            <div class="detail-section">
              <h4 style="color:#9c40ff">Tech Specs</h4>
              <div class="specs-grid">${specsHtml}</div>
              <div class="detail-actions" style="margin-top:20px">
                <button class="btn-docs">View Documentation</button>
                <button class="btn-demo">Demo Studio</button>
              </div>
            </div>
          </div>
        </td>
      </tr>
      `;
    }
  });

  tbody.innerHTML = html;

  // Row click
  document.querySelectorAll('tr.feature-row').forEach(row => {
    row.addEventListener('click', () => {
      const id = row.dataset.id;
      expandedId = expandedId === id ? null : id;
      renderTable();
    });
  });
}

// Era filter
document.querySelectorAll('[data-era]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-era]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeEra = btn.dataset.era;
    expandedId = null;
    renderTable();
  });
});

// Channel filter
document.querySelectorAll('[data-channel]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-channel]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeChannel = btn.dataset.channel;
    expandedId = null;
    renderTable();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  expandedId = null;
  renderTable();
});

// Initial render
renderTable();
</script>
</body>
</html>
